<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Access Entropy Index</title>
  <desc id="desc">A dark information-flow banner with connected nodes, entropy waves, and the project title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#10251f"/>
    </linearGradient>
    <linearGradient id="flow" x1="170" y1="112" x2="1118" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#35d399"/>
      <stop offset="1" stop-color="#f4c430"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(995 112) rotate(125) scale(366 296)">
      <stop offset="0" stop-color="#35d399" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#35d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="28" fill="url(#pulse)"/>


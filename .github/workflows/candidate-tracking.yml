name: Candidate Tracking

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write

jobs:
  discover-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover candidates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discover_candidates.py --limit-per-source 20

      - name: Review candidates
        run: python scripts/review_candidates.py

      - name: Sync tracked entity status
        run: python scripts/sync_tracking_status.py

      - name: Update README statistics
        run: python scripts/update_readme_stats.py

      - name: Commit candidate tracking state
        run: |
          if git diff --quiet -- data/09-candidates data/05-tracked-entities.csv README.md README.zh-CN.md; then
            echo "No candidate changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/09-candidates data/05-tracked-entities.csv README.md README.zh-CN.md
          git commit -m "Update candidate tracking state"
          git push
